name: TCF Canada Monitor

on:
  schedule:
    # Corre cada 6 horas: 00:00, 06:00, 12:00, 18:00 UTC
    # UTC-7 (PDT, Surrey BC): 17:00, 23:00, 05:00, 11:00
    - cron: "0 */2 * * *"
  workflow_dispatch:
    # Permite correrlo manualmente desde github.com con un click

jobs:
  check-availability:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 lxml

      - name: Correr monitor
        env:
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python tcf_monitor.py --check-once

      - name: Guardar log como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tcf-log-${{ github.run_number }}
          path: |
            tcf_monitor.log
            tcf_estado.json
          retention-days: 7

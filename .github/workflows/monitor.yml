name: TCF Canada Monitor

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-availability:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 lxml

      - name: Correr monitor
        env:
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python tcf_monitor.py --check-once

      - name: Generar ICS actualizado
        run: python generar_ics.py

      - name: Commit ICS y estado al repositorio
        run: |
          git config user.name  "TCF Monitor Bot"
          git config user.email "tcf-monitor@noreply.github.com"
          git add TCF_Canada_2026.ics tcf_estado.json
          git diff --cached --quiet || git commit -m "chore: actualizar ICS y estado [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Guardar log como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tcf-log-${{ github.run_number }}
          path: tcf_monitor.log
          retention-days: 14
